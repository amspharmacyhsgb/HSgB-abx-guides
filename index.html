<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  :root {
    --maroon:       #7B0D20;
    --maroon-dark:  #5A0A17;
    --maroon-deep:  #3E0710;
    --maroon-hover: #921527;
    --gold:         #C9A84C;
    --gold-light:   #E2C16F;
    --gold-dim:     #9A7A30;
    --cream:        #F8F3EF;
    --cream-2:      #EFE8E1;
    --white:        #FFFFFF;
    --text:         #1C0409;
    --text-mid:     #5A1A25;
    --text-muted:   #957080;
    --border:       rgba(123,13,32,0.11);
    --border-md:    rgba(123,13,32,0.22);
    --r-lg:         14px;
    --r-md:         9px;
    --r-sm:         5px;
  }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 200;
    background: var(--maroon-dark);
    border-bottom: 1px solid rgba(201,168,76,0.22);
    padding: 0 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 62px;
  }
  .header-logo {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.22), 0 0 12px rgba(201,168,76,0.15);
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 1rem;
    font-weight: 800;
    color: var(--gold-light);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 0.67rem;
    color: rgba(255,255,255,0.42);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .staff-badge {
    background: var(--maroon);
    border: 1px solid rgba(201,168,76,0.35);
    color: #fff;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 4px 11px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ─── MAIN ─── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 22px 16px 80px;
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.95rem;
    pointer-events: none;
    color: var(--text-muted);
  }
  #search {
    width: 100%;
    background: var(--white);
    border: 1.5px solid var(--border-md);
    border-radius: 100px;
    padding: 13px 46px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 10px rgba(123,13,32,0.07);
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus {
    border-color: var(--maroon);
    box-shadow: 0 0 0 3px rgba(123,13,32,0.09), 0 2px 10px rgba(123,13,32,0.07);
  }
  .clear-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--cream-2);
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    display: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
    align-items: center;
    justify-content: center;
  }
  .clear-btn.shown { display: flex; }
  .clear-btn:hover { background: var(--maroon); color: #fff; }

  /* ─── TILE GRID ─── */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    animation: fadeUp 0.5s ease both;
  }
  .tile {
    background: var(--maroon);
    border-radius: var(--r-lg);
    padding: 18px 16px 14px;
    cursor: pointer;
    transition: background 0.18s, box-shadow 0.18s, transform 0.14s;
    border: 2px solid transparent;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .tile::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(rgba(255,255,255,0.07), transparent);
    pointer-events: none;
    border-radius: var(--r-lg) var(--r-lg) 0 0;
  }
  .tile:hover {
    background: var(--maroon-hover);
    box-shadow: 0 6px 20px rgba(123,13,32,0.28);
    transform: translateY(-2px);
  }
  .tile.active {
    border-color: var(--gold);
    background: var(--maroon-hover);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.25), 0 8px 24px rgba(123,13,32,0.30);
  }
  .tile-icon { font-size: 1.7rem; display: block; margin-bottom: 10px; line-height: 1; }
  .tile-name {
    font-size: 0.81rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .tile-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tile-count {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.50);
    font-weight: 500;
  }
  .tile-chevron {
    font-size: 0.62rem;
    color: var(--gold);
    opacity: 0.75;
    transition: transform 0.25s ease, opacity 0.2s;
  }
  .tile.active .tile-chevron { transform: rotate(180deg); opacity: 1; }

  /* ─── EXPAND PANEL ─── */
  .expand-panel {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.42s ease, opacity 0.3s ease;
    margin-top: 0;
  }
  .expand-panel.open {
    max-height: 2600px;
    opacity: 1;
    margin-top: 10px;
  }
  .expand-inner {
    background: var(--white);
    border-radius: var(--r-lg);
    border: 1px solid var(--border-md);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(123,13,32,0.09);
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: var(--maroon-dark);
    border-bottom: 1px solid rgba(201,168,76,0.18);
  }
  .panel-head-icon { font-size: 1.15rem; }
  .panel-head-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    flex: 1;
  }
  .panel-close {
    background: rgba(255,255,255,0.10);
    border: none;
    color: rgba(255,255,255,0.55);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 4px 9px;
    border-radius: var(--r-sm);
    transition: background 0.15s, color 0.15s;
    line-height: 1.4;
    font-family: inherit;
  }
  .panel-close:hover { background: rgba(255,255,255,0.22); color: #fff; }

  /* ─── LINK ROWS ─── */
  a.link-row {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 12px 18px;
    text-decoration: none;
    color: var(--text);
    border-bottom: 1px solid rgba(123,13,32,0.07);
    transition: background 0.14s;
  }
  a.link-row:last-child { border-bottom: none; }
  a.link-row:hover { background: #FEF4F5; }
  a.link-row:hover .row-arrow { transform: translateX(4px); color: var(--maroon); }

  .chip {
    font-size: 0.58rem;
    font-weight: 800;
    letter-spacing: 0.09em;
    padding: 3px 7px;
    border-radius: var(--r-sm);
    flex-shrink: 0;
    min-width: 34px;
    text-align: center;
  }
  .chip.pdf { background: rgba(123,13,32,0.08); color: var(--maroon); border: 1px solid rgba(123,13,32,0.20); }
  .chip.web { background: rgba(154,122,48,0.09); color: var(--gold-dim); border: 1px solid rgba(154,122,48,0.28); }

  .row-text { flex: 1; min-width: 0; }
  .row-title {
    font-size: 0.865rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }
  .row-sub {
    font-size: 0.69rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .row-arrow {
    color: var(--text-muted);
    font-size: 0.9rem;
    transition: transform 0.18s, color 0.18s;
    flex-shrink: 0;
  }

  /* ─── SEARCH RESULTS ─── */
  #searchResults {
    display: none;
    flex-direction: column;
    gap: 18px;
    animation: fadeUp 0.3s ease both;
  }
  .res-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--maroon);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-left: 2px;
  }
  .res-group {
    background: var(--white);
    border-radius: var(--r-lg);
    border: 1px solid var(--border-md);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(123,13,32,0.05);
  }
  #noResults {
    display: none;
    text-align: center;
    padding: 64px 20px;
    color: var(--text-muted);
  }
  #noResults .nr-icon { font-size: 2.8rem; margin-bottom: 14px; }
  #noResults p { font-size: 0.9rem; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 22px 16px 40px;
    border-top: 1px solid var(--border);
  }
  .footer-email {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--maroon);
    text-decoration: none;
    font-size: 0.81rem;
    font-weight: 600;
    transition: color 0.18s;
    margin-bottom: 10px;
  }
  .footer-email:hover { color: var(--maroon-hover); }
  .footer-note {
    font-size: 0.64rem;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* ─── BACK TO TOP ─── */
  #btt {
    position: fixed;
    bottom: 22px; right: 18px;
    width: 42px; height: 42px;
    background: var(--maroon);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    z-index: 99;
    box-shadow: 0 4px 18px rgba(123,13,32,0.38);
  }
  #btt.visible { opacity: 1; transform: translateY(0); }
  #btt:hover { background: var(--maroon-hover); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 440px) {
    .tile-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .tile { padding: 14px 12px 11px; }
    .tile-icon { font-size: 1.4rem; margin-bottom: 8px; }
    .tile-name { font-size: 0.75rem; }
    .header-title { font-size: 0.88rem; }
    .staff-badge { font-size: 0.53rem; padding: 3px 8px; }
  }
  @media (max-width: 320px) {
    .tile-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  const t = document.createElement('div');
  t.className = 'tile';
  t.dataset.idx = i;
  t.innerHTML = `
    <span class="tile-icon">${sec.icon}</span>
    <div class="tile-name">${sec.name}</div>
    <div class="tile-meta">
      <span class="tile-count">${sec.links.length} guide${sec.links.length !== 1 ? 's' : ''}</span>
      <span class="tile-chevron">▼</span>
    </div>`;
  t.addEventListener('click', () => togglePanel(i));
  grid.appendChild(t);
});

// ── PANEL LOGIC ──
let activeIdx = -1;
const panel      = document.getElementById('expandPanel');
const panelIcon  = document.getElementById('panelIcon');
const panelTitle = document.getElementById('panelTitle');
const panelLinks = document.getElementById('panelLinks');

function linkRowHTML(link) {
  return `<a class="link-row" href="${link.url}" target="_blank" rel="noopener">
    <span class="chip ${link.type}">${link.type.toUpperCase()}</span>
    <div class="row-text">
      <div class="row-title">${link.title}</div>
      ${link.sub ? `<div class="row-sub">${link.sub}</div>` : ''}
    </div>
    <span class="row-arrow">→</span>
  </a>`;
}

function togglePanel(idx) {
  const tiles = document.querySelectorAll('.tile');
  if (activeIdx === idx) {
    panel.classList.remove('open');
    tiles[idx].classList.remove('active');
    activeIdx = -1;
    return;
  }
  activeIdx = idx;
  tiles.forEach((t, i) => t.classList.toggle('active', i === idx));
  const sec = sections[idx];
  panelIcon.textContent  = sec.icon;
  panelTitle.textContent = sec.name;
  panelLinks.innerHTML   = sec.links.map(linkRowHTML).join('');
  panel.classList.add('open');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

document.getElementById('panelClose').addEventListener('click', () => {
  panel.classList.remove('open');
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
  activeIdx = -1;
});

// ── SEARCH ──
const searchEl  = document.getElementById('search');
const clearBtn  = document.getElementById('clearBtn');
const resultsEl = document.getElementById('searchResults');
const noResEl   = document.getElementById('noResults');
const termEl    = document.getElementById('searchTerm');

function showGrid() {
  grid.style.display = '';
  panel.style.display = '';
  resultsEl.style.display = 'none';
  noResEl.style.display = 'none';
}

function doSearch() {
  const q = searchEl.value.trim().toLowerCase();
  clearBtn.classList.toggle('shown', q.length > 0);

  if (!q) { showGrid(); return; }

  grid.style.display = 'none';
  panel.style.display = 'none';
  resultsEl.style.display = 'flex';

  let html = '', any = false;
  sections.forEach(sec => {
    const hits = sec.links.filter(l =>
      l.title.toLowerCase().includes(q) ||
      (l.sub && l.sub.toLowerCase().includes(q)) ||
      sec.name.toLowerCase().includes(q)
    );
    if (!hits.length) return;
    any = true;
    html += `<div>
      <div class="res-label">${sec.icon} ${sec.name}</div>
      <div class="res-group">${hits.map(linkRowHTML).join('')}</div>
    </div>`;
  });

  resultsEl.innerHTML = html;
  noResEl.style.display = any ? 'none' : 'block';
  if (!any) { termEl.textContent = q; resultsEl.style.display = 'none'; }
}

searchEl.addEventListener('input', doSearch);
clearBtn.addEventListener('click', () => { searchEl.value = ''; doSearch(); searchEl.focus(); });

// ── BACK TO TOP ──
const btt = document.getElementById('btt');
window.addEventListener('scroll', () => btt.classList.toggle('visible', scrollY > 280));
</script>
</body>
</html>
